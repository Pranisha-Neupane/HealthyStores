{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-card">
    <h4 class="text-center mb-3">🔑 Reset Password</h4>
    <p class="small text-muted text-center">Enter your email — we'll send you a reset link. (In development the link prints to the server terminal.)</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
        <button class="btn btn-order w-100" type="submit">Send Reset Link</button>
    </form>
</div>
{% endblock %}
