{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
    <h4 class="text-center mb-3">Choose a New Password</h4>
    {% if validlink %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">New Password</label><input type="password" name="new_password1" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Confirm Password</label><input type="password" name="new_password2" class="form-control" required></div>
        {{ form.errors }}
        <button class="btn btn-order w-100" type="submit">Set Password</button>
    </form>
    {% else %}
    <p class="text-danger text-center">This reset link is invalid or expired. Please request a new one.</p>
    <a href="{% url 'accounts:password_reset' %}" class="btn btn-order w-100">Request New Link</a>
    {% endif %}
</div>
{% endblock %}
